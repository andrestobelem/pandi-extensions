# kitty configuration — pandi-extensions dev environment
#
# Active settings only (captured from kitty 0.47.4). Everything not listed
# here uses kitty's built-in defaults. Install by copying this file and
# current-theme.conf into ~/.config/kitty/ — see docs/kitty.md.

# Theme: Catppuccin-Latte (colors live in current-theme.conf)
include current-theme.conf

# Font — requires "FiraCode Nerd Font Mono" installed on the system
font_family FiraCode Nerd Font Mono
font_size 14.0

# Scrollback & selection
scrollback_lines 10000
copy_on_select yes

# Bell & window chrome
enable_audio_bell no
window_padding_width 8
hide_window_decorations titlebar-only

# Tab bar (powerline, slanted, numbered titles)
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
tab_title_template "{index} {title}"
active_tab_font_style bold

# Transparency / blur
background_opacity 0.88
background_blur 5

# Remote control — used by Supacode and scripting (kitty @ commands)
allow_remote_control yes
listen_on unix:/tmp/kitty

# Keyboard shortcuts
# New tab inherits the current window's working directory
map cmd+t new_tab_with_cwd
